services:
  portal:
    build:
      context: .
      dockerfile: docker/portal.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
